<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Details - EventSphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --dark: #0D0D0D;
            --surface: #161616;
            --card: #1E1E1E;
            --text: #F0EDE8;
            --muted: #888;
            --accent: #E8C96A;
            --error: #FF6B6B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 80% 10%, rgba(201,168,76,0.07) 0%, transparent 60%);
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid rgba(201,168,76,0.15);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            background: transparent;
            border: 1px solid rgba(201,168,76,0.3);
            color: var(--gold);
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(201,168,76,0.1);
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .event-banner {
            background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .event-banner .icon { font-size: 2.5rem; }

        .event-banner h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--accent);
        }

        .event-banner p {
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .step-label {
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 24px;
            font-weight: 500;
        }

        .member-form {
            background: var(--card);
            border: 1px solid rgba(201,168,76,0.15);
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 20px;
            position: relative;
        }

        .member-form::before {
            content: attr(data-num);
            position: absolute;
            top: 28px;
            right: 28px;
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 900;
            color: rgba(201,168,76,0.1);
            line-height: 1;
        }

        .member-form h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--accent);
            margin-bottom: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 500;
        }

        .form-group input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--gold);
            background: rgba(201,168,76,0.05);
        }

        .form-group input::placeholder { color: var(--muted); }

        .submit-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 40px;
        }

        .summary {
            font-size: 0.9rem;
            color: var(--muted);
        }

        .summary strong {
            color: var(--accent);
        }

        .submit-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, var(--gold), var(--accent));
            color: var(--dark);
            border: none;
            padding: 18px 48px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-family: 'DM Sans', sans-serif;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(201,168,76,0.4);
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <button class="back-btn" onclick="history.back()">← Back</button>
        <h1>EventSphere</h1>
    </header>

    <div class="container">
        <p class="step-label">Step 2 of 2 — Member Details</p>

        <div class="event-banner">
            <div class="icon">🎯</div>
            <div>
                <h2 th:text="${event.name}">Event Name</h2>
                <p>
                    📅 <span th:text="${event.date}">Date</span> &nbsp;|&nbsp;
                    📍 <span th:text="${event.venue}">Venue</span> &nbsp;|&nbsp;
                    👥 <span th:text="${memberCount}">1</span> member(s)
                </p>
            </div>
        </div>

        <form action="/submit" method="post">
            <input type="hidden" name="memberCount" th:value="${memberCount}"/>
            <input type="hidden" name="eventName" th:value="${event.name}"/>
            <input type="hidden" name="memberCount" th:value="${memberCount}"/>
    <input type="hidden" name="eventName" th:value="${event.name}"/>
    <input type="hidden" name="eventId" th:value="${event.id}"/>

            <div th:each="i : ${#numbers.sequence(0, memberCount - 1)}"
                 class="member-form"
                 th:attr="data-num=${i + 1}">
                <h3>👤 Member <span th:text="${i + 1}">1</span></h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="names" placeholder="Enter full name" required/>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="emails" placeholder="Enter email" required/>
                    </div>
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" name="ages" placeholder="Enter age" min="1" max="120" required/>
                    </div>
                    <div class="form-group">
                        <label>Event</label>
                        <input type="text" th:value="${event.name}" readonly 
                               style="opacity: 0.6; cursor: not-allowed;"/>
                    </div>
                </div>
            </div>

            <div class="submit-section">
                <p class="summary">
                    Registering <strong th:text="${memberCount}">1</strong> member(s) for 
                    <strong th:text="${event.name}">Event</strong>
                </p>
                <button type="submit" class="submit-btn">
                    Submit Registration ✓
                </button>
            </div>
        </form>
    </div>

</body>
</html>
