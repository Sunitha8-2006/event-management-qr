<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --dark: #0D0D0D;
            --surface: #161616;
            --card: #1E1E1E;
            --text: #F0EDE8;
            --muted: #888;
            --accent: #E8C96A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.08) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.05) 0%, transparent 50%);
        }

        header {
            text-align: center;
            padding: 60px 20px 40px;
            position: relative;
        }

        header::after {
            content: '';
            display: block;
            width: 80px;
            height: 2px;
            background: var(--gold);
            margin: 20px auto 0;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--muted);
            font-size: 1.1rem;
            margin-top: 12px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 20px 60px;
        }

        .section-label {
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 24px;
            font-weight: 500;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .event-card {
            background: var(--card);
            border: 1px solid rgba(201,168,76,0.15);
            border-radius: 16px;
            padding: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .event-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .event-card:hover {
            border-color: var(--gold);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .event-card:hover::before { opacity: 1; }

        .event-card.selected {
            border-color: var(--gold);
            background: rgba(201,168,76,0.08);
        }

        .event-card.selected::before { opacity: 1; }

        .event-icon {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }

        .event-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        .event-card p {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .event-meta {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: rgba(240,237,232,0.6);
        }

        .meta-item span:first-child {
            font-size: 1rem;
        }

        .check-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 28px;
            height: 28px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .event-card.selected .check-badge { opacity: 1; }

        /* Member Count Section */
        .member-section {
            background: var(--card);
            border: 1px solid rgba(201,168,76,0.15);
            border-radius: 16px;
            padding: 36px;
            margin-bottom: 30px;
        }

        .member-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 24px;
            color: var(--accent);
        }

        .counter-wrap {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .counter-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .counter-btn:hover {
            background: var(--gold);
            color: var(--dark);
        }

        #memberDisplay {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--gold);
            min-width: 80px;
            text-align: center;
        }

        .member-label {
            color: var(--muted);
            font-size: 0.9rem;
        }

        /* Next Button */
        .next-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, var(--gold), var(--accent));
            color: var(--dark);
            border: none;
            padding: 18px 48px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-family: 'DM Sans', sans-serif;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(201,168,76,0.4);
        }
        .disabled-card {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
}
        .error-banner {
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.4);
    border-radius: 12px;
    padding: 16px 24px;
    margin-bottom: 24px;
    color: #FF6B6B;
    font-size: 0.95rem;
    display: none;
}
.error-banner.visible { display: block; }

.seats-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    margin-top: 10px;
}
.seats-available { background: rgba(76,175,80,0.15); color: #4CAF50; }
.seats-low { background: rgba(255,193,7,0.15); color: #FFC107; }
.seats-full { background: rgba(255,107,107,0.15); color: #FF6B6B; }

        .next-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .arrow { font-size: 1.2rem; transition: transform 0.2s; }
        .next-btn:hover .arrow { transform: translateX(4px); }

        .selected-info {
            background: rgba(201,168,76,0.08);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 10px;
            padding: 16px 24px;
            margin-bottom: 24px;
            font-size: 0.95rem;
            color: var(--accent);
            display: none;
        }

        .selected-info.visible { display: block; }
    </style>
</head>
<body>

    <header>
        <h1>Event Management</h1>
        <p>Discover &amp; Register for Premium Events</p>
    </header>

    <div class="container">
        <p class="section-label">Step 1 of 2 — Select Your Event</p>

        <div th:each="event : ${events}"
     class="event-card"
     th:attr="data-id=${event.id}, data-name=${event.name}, data-remaining=${event.remainingSeats}"
     th:classappend="${event.remainingSeats == 0} ? ' disabled-card'"
     onclick="selectEvent(this)">
    <div class="check-badge">✓</div>
    <div class="event-icon">🎯</div>
    <h3 th:text="${event.name}">Event Name</h3>
    <p th:text="${event.description}">Description</p>
    <div class="event-meta">
        <div class="meta-item">
            <span>📅</span>
            <span th:text="${event.date}">Date</span>
        </div>
        <div class="meta-item">
            <span>📍</span>
            <span th:text="${event.venue}">Venue</span>
        </div>
        <div class="meta-item">
            <span>👥</span>
            <span>Max <span th:text="${event.maxMembers}">0</span> members</span>
        </div>
    </div>
    <!-- REMAINING SEATS BADGE -->
    <div th:if="${event.remainingSeats > 5}"
         class="seats-badge seats-available">
        ✅ <span th:text="${event.remainingSeats}">0</span> seats left
    </div>
    <div th:if="${event.remainingSeats > 0 and event.remainingSeats <= 5}"
         class="seats-badge seats-low">
        ⚡ Only <span th:text="${event.remainingSeats}">0</span> seats left!
    </div>
    <div th:if="${event.remainingSeats == 0}"
         class="seats-badge seats-full">
        🚫 Fully Booked
    </div>
</div>

        <div id="selectedInfo" class="selected-info">
            ✅ Selected: <strong id="selectedName"></strong>
        </div>

        <div class="member-section">
            <h2>How many members?</h2>
            <div class="counter-wrap">
                <button class="counter-btn" onclick="changeCount(-1)">−</button>
                <div id="memberDisplay">1</div>
                <button class="counter-btn" onclick="changeCount(1)">+</button>
                <span class="member-label">members attending</span>
            </div>
        </div>

        <button class="next-btn" id="nextBtn" onclick="goNext()" disabled>
            Continue to Details
            <span class="arrow">→</span>
        </button>
    </div>
    <div id="errorBanner" class="error-banner" th:classappend="${error != null} ? 'visible'">
    ⚠️ <span th:text="${error}">Error message</span>
</div>

    <script>
        let selectedEventId = null;
        let memberCount = 1;

        function selectEvent(card) {
            const remaining = parseInt(card.getAttribute('data-remaining'));
            if (remaining === 0) return;

            document.querySelectorAll('.event-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedEventId = card.getAttribute('data-id');
            const eventName = card.getAttribute('data-name');

            document.getElementById('selectedName').textContent = eventName + ' (' + remaining + ' seats left)';
            document.getElementById('selectedInfo').classList.add('visible');
            document.getElementById('nextBtn').disabled = false;

            // Also cap member count to remaining seats
            if (memberCount > remaining) {
                memberCount = remaining;
                document.getElementById('memberDisplay').textContent = memberCount;
            }
        }

        function changeCount(delta) {
            const card = document.querySelector('.event-card.selected');
            const maxAllowed = card ? parseInt(card.getAttribute('data-remaining')) : 20;
            memberCount = Math.max(1, Math.min(maxAllowed, memberCount + delta));
            document.getElementById('memberDisplay').textContent = memberCount;
        }

        function goNext() {
            if (!selectedEventId) {
                alert('Please select an event first!');
                return;
            }
            window.location.href = '/details?eventId=' + selectedEventId + '&memberCount=' + memberCount;
        }
    </script>
</body>
</html>
