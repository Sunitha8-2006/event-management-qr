<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner - EventSphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --gold: #C9A84C;
            --dark: #0D0D0D;
            --card: #1E1E1E;
            --text: #F0EDE8;
            --muted: #888;
            --accent: #E8C96A;
            --green: #4CAF50;
            --red: #FF6B6B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: #111;
            border-bottom: 1px solid rgba(201,168,76,0.15);
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            background: linear-gradient(135deg, var(--gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .home-btn {
            background: transparent;
            border: 1px solid rgba(201,168,76,0.3);
            color: var(--gold);
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .home-btn:hover { background: rgba(201,168,76,0.1); }

        .scanner-container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
        }

        .page-title {
            text-align: center;
            margin-bottom: 36px;
        }

        .page-title h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            background: linear-gradient(135deg, var(--gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .page-title p { color: var(--muted); font-size: 0.95rem; }

        /* Camera Box */
        .camera-box {
            background: var(--card);
            border: 2px solid rgba(201,168,76,0.2);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 24px;
            position: relative;
        }

        #qr-reader {
            width: 100%;
        }

        .scanner-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            pointer-events: none;
        }

        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: var(--gold);
            border-style: solid;
        }

        .corner-tl { top: 0; left: 0; border-width: 3px 0 0 3px; }
        .corner-tr { top: 0; right: 0; border-width: 3px 3px 0 0; }
        .corner-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; }
        .corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; }

        /* Controls */
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .ctrl-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(201,168,76,0.3);
            background: transparent;
            color: var(--gold);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .result-panel.already-scanned {
    display: block;
    background: rgba(255, 140, 0, 0.1);
    border: 2px solid #FF8C00;
}

.result-panel.already-scanned .status-title {
    color: #FF8C00;
}

        .ctrl-btn:hover { background: rgba(201,168,76,0.1); }
        .ctrl-btn.primary { background: linear-gradient(135deg, var(--gold), var(--accent)); color: var(--dark); border: none; }

        /* Result Panel */
        .result-panel {
            border-radius: 16px;
            padding: 28px;
            display: none;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .result-panel.allowed {
            display: block;
            background: rgba(76, 175, 80, 0.1);
            border: 2px solid var(--green);
        }

        .result-panel.denied {
            display: block;
            background: rgba(255, 107, 107, 0.1);
            border: 2px solid var(--red);
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .status-icon {
            font-size: 3rem;
        }

        .status-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
        }

        .result-panel.allowed .status-title { color: var(--green); }
        .result-panel.denied .status-title { color: var(--red); }

        .person-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .detail-item {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 14px 16px;
        }

        .detail-item .label {
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .detail-item .value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
        }

        /* Scan Again */
        .scan-again {
            display: none;
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .scan-again:hover { background: rgba(201,168,76,0.1); }
        .scan-again.visible { display: block; }
    </style>
</head>
<body>

    <header>
        <h1>EventSphere — Scanner</h1>
        <a href="/" class="home-btn">🏠 Home</a>
    </header>

    <div class="scanner-container">

        <div class="page-title">
            <h2>📷 QR Code Scanner</h2>
            <p>Point your camera at an event QR code to verify entry</p>
        </div>

        <div class="camera-box">
            <div id="qr-reader"></div>
            <div class="scanner-overlay">
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" onclick="stopScanner()">⏹ Stop</button>
            <button class="ctrl-btn primary" onclick="startScanner()">▶ Start Camera</button>
        </div>

        <!-- Result -->
        <div id="resultPanel" class="result-panel">
            <div class="result-header">
                <div id="statusIcon" class="status-icon">✅</div>
                <div id="statusTitle" class="status-title">Person Allowed</div>
            </div>
            <div id="personDetails" class="person-details"></div>
        </div>

        <button id="scanAgainBtn" class="scan-again" onclick="resetScanner()">
            🔄 Scan Another
        </button>

    </div>

    <script>
        let html5QrCode = null;
        let isScanning = false;

        function startScanner() {
            if (isScanning) return;

            html5QrCode = new Html5Qrcode("qr-reader");

            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                onScanSuccess,
                onScanFailure
            ).then(() => {
                isScanning = true;
            }).catch(err => {
                alert("Camera error: " + err + "\nMake sure you are on HTTPS or localhost.");
            });
        }

        function stopScanner() {
            if (html5QrCode && isScanning) {
                html5QrCode.stop().then(() => {
                    isScanning = false;
                });
            }
        }

        function onScanSuccess(decodedText) {
            stopScanner();

            // Expected format: EVT:<token>
            let token = decodedText;
            if (decodedText.startsWith("EVT:")) {
                token = decodedText.substring(4);
            }

            // Call backend to verify
            fetch('/api/verify/' + token)
                .then(res => res.json())
                .then(data => showResult(data))
                .catch(err => showResult({ allowed: false, message: "Network error" }));
        }

        function onScanFailure(error) {
            // Silent fail — keep scanning
        }

        function showResult(data) {
            const panel = document.getElementById('resultPanel');
            const icon = document.getElementById('statusIcon');
            const title = document.getElementById('statusTitle');
            const details = document.getElementById('personDetails');
            const scanAgain = document.getElementById('scanAgainBtn');

            // 3 states: allowed, already scanned, denied
            if (data.allowed) {
                panel.className = 'result-panel allowed';
                icon.textContent = '✅';
                title.textContent = 'Person Allowed!';
                details.innerHTML = `
                    <div class="detail-item">
                        <div class="label">Name</div>
                        <div class="value">${data.name}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Email</div>
                        <div class="value">${data.email}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Age</div>
                        <div class="value">${data.age}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Event</div>
                        <div class="value">${data.event}</div>
                    </div>
                `;
            } else if (data.alreadyScanned) {
                // ⚠️ ALREADY SCANNED STATE
                panel.className = 'result-panel already-scanned';
                icon.textContent = '⚠️';
                title.textContent = 'Already Entered!';
                details.innerHTML = `
                    <div class="detail-item">
                        <div class="label">Name</div>
                        <div class="value">${data.name}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Event</div>
                        <div class="value">${data.event}</div>
                    </div>
                    <div class="detail-item" style="grid-column: span 2;">
                        <div class="label">First Scanned At</div>
                        <div class="value" style="color: #FFC107;">
                            ${data.scannedAt ? new Date(data.scannedAt).toLocaleString() : 'Unknown time'}
                        </div>
                    </div>
                    <div class="detail-item" style="grid-column: span 2;">
                        <div class="label">Status</div>
                        <div class="value" style="color: #FF8C00;">
                            ⚠️ This person has already been admitted. Do not allow re-entry.
                        </div>
                    </div>
                `;
            } else {
                panel.className = 'result-panel denied';
                icon.textContent = '❌';
                title.textContent = 'Access Denied';
                details.innerHTML = `
                    <div class="detail-item" style="grid-column: span 2;">
                        <div class="label">Reason</div>
                        <div class="value" style="color: #FF6B6B;">${data.message}</div>
                    </div>
                `;
            }

            scanAgain.classList.add('visible');
        }
        function resetScanner() {
            document.getElementById('resultPanel').className = 'result-panel';
            document.getElementById('personDetails').innerHTML = '';
            document.getElementById('scanAgainBtn').classList.remove('visible');
            startScanner();
        }

        // Auto-start on page load
        window.onload = function() {
            setTimeout(startScanner, 500);
        };
    </script>

</body>
</html>
