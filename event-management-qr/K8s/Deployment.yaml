apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-app
  template:
    metadata:
      labels:
        app: event-app
    spec:
      containers:
      - name: event-app
        image: sunithaappanapalli/event-app:latest
        ports:
        - containerPort: 8080